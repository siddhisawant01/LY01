<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Big and Small Game</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Nunito',sans-serif;
}

/* ================= SLIDES ================= */

.slide{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ================= SLIDE 1 ================= */

#slide1{
    background:white;
    z-index:20;
    animation:fadeOut 1s ease forwards;
    animation-delay:2s;
}

.logo{
    width:280px;
    max-width:70vw;
    animation:zoomIn 1s ease;
}

@keyframes zoomIn{
    from{
        transform:scale(0.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

@keyframes fadeOut{
    to{
        opacity:0;
        visibility:hidden;
    }
}

/* ================= SLIDE 2 ================= */

#slide2{
    flex-direction:column;
    padding:10px;

    background:
    linear-gradient(rgba(255,255,255,0.15),rgba(255,255,255,0.15)),
    url("https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=1200&auto=format&fit=crop");

    background-size:cover;
    background-position:center;

    overflow:hidden;
}

.title{
    font-size:clamp(24px,3vw,45px);
    color:white;
    font-weight:900;
    margin-bottom:10px;
    text-shadow:3px 3px 8px rgba(0,0,0,0.3);
    text-align:center;
}

/* MAIN LAYOUT */

.main-container{
    width:100%;
    height:calc(100vh - 90px);

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

/* ================= LEFT PANEL ================= */

.left-panel{
    background:rgba(255,255,255,0.88);

    border-radius:25px;
    padding:10px;

    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;

    height:100%;
}

/* ================= CARDS ================= */

.card{
    background:white;

    border-radius:20px;
    border:5px solid;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:6px;

    cursor:grab;

    transition:0.3s;

    min-height:0;

    box-shadow:0 5px 10px rgba(0,0,0,0.12);
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:55%;
    height:55%;
    object-fit:contain;
    max-width:80px;
    max-height:80px;
}

.card p{
    margin-top:5px;
    font-size:clamp(14px,1.3vw,20px);
    font-weight:800;
    color:#444;
    text-align:center;
}

/* BORDER COLORS */

.border1{ border-color:#ff6b6b; }
.border2{ border-color:#48dbfb; }
.border3{ border-color:#1dd1a1; }
.border4{ border-color:#f368e0; }
.border5{ border-color:#feca57; }
.border6{ border-color:#5f27cd; }

/* ================= RIGHT PANEL ================= */

.right-panel{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    height:100%;
}

.zone{
    background:rgba(255,255,255,0.9);

    border-radius:25px;
    border:5px dashed white;

    padding:10px;

    display:flex;
    flex-direction:column;
    align-items:center;

    overflow:hidden;
}

.zone h2{
    font-size:clamp(22px,2vw,35px);
    color:#ff4081;
    font-weight:900;
    margin-bottom:10px;
}

.drop-items{
    width:100%;

    display:grid;
    grid-template-columns:1fr;
    gap:8px;

    overflow:hidden;
}

/* ================= FEEDBACK ================= */

.feedback{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:90px;
    opacity:0;
    pointer-events:none;
    z-index:999;
}

.show{
    animation:popup 0.8s ease;
}

@keyframes popup{
    0%{
        transform:translate(-50%,-50%) scale(0.3);
        opacity:0;
    }
    40%{
        transform:translate(-50%,-50%) scale(1.3);
        opacity:1;
    }
    100%{
        transform:translate(-50%,-50%) scale(1);
        opacity:0;
    }
}

/* ================= SLIDE 3 ================= */

#slide3{
    display:none;
    background:linear-gradient(135deg,#ff9ff3,#feca57,#48dbfb);
    overflow:hidden;
    flex-direction:column;
}

.success{
    font-size:clamp(55px,10vw,120px);
    color:white;
    font-weight:900;
    text-shadow:4px 4px 12px rgba(0,0,0,0.3);
    z-index:10;
    animation:bounce 1s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

/* ================= MOBILE FIX ================= */

@media(max-width:900px){

    .main-container{
        grid-template-columns:1fr 1fr;
        gap:8px;
        height:calc(100vh - 80px);
    }

    .left-panel{
        gap:8px;
        padding:8px;
    }

    .right-panel{
        gap:8px;
    }

    .card{
        border-width:4px;
        border-radius:18px;
    }

    .card img{
        max-width:60px;
        max-height:60px;
    }

    .zone{
        padding:8px;
        border-width:4px;
    }

    .zone h2{
        font-size:28px;
        margin-bottom:5px;
    }

    .feedback{
        font-size:75px;
    }
}

/* EXTRA SMALL MOBILE */

@media(max-width:600px){

    .title{
        font-size:28px;
        margin-bottom:6px;
    }

    .main-container{
        height:calc(100vh - 65px);
        gap:6px;
    }

    .left-panel{
        gap:6px;
        padding:6px;
    }

    .right-panel{
        gap:6px;
    }

    .card{
        padding:4px;
    }

    .card img{
        max-width:52px;
        max-height:52px;
    }

    .card p{
        font-size:14px;
    }

    .zone h2{
        font-size:24px;
    }
}

</style>
</head>

<body>

<!-- ================= AUDIO ================= -->

<!-- Replace with your correct sound -->
<audio id="correctSound">
<source src="correct.mp3" type="audio/mpeg">
</audio>

<!-- Replace with your wrong sound -->
<audio id="wrongSound">
<source src="assets/wrong.mp3" type="audio/mpeg">
</audio>

<!-- ================= FEEDBACK ================= -->

<div id="tick" class="feedback">✅</div>
<div id="cross" class="feedback">❌</div>

<!-- ================= SLIDE 1 ================= -->

<div id="slide1" class="slide">

    <!-- Replace with your logo -->
    <img src="assets/innovine-logo.png" class="logo" alt="Innovine Logo">

</div>

<!-- ================= SLIDE 2 ================= -->

<div id="slide2" class="slide">

    <div class="title">
        Identify big and small
    </div>

    <div class="main-container">

        <!-- LEFT PANEL -->

        <div class="left-panel" id="pool">

            <!-- ELEPHANT -->
            <div class="card border1"
                 draggable="true"
                 data-answer="big">

                <img src="assets/elephant.png" alt="Elephant">
                <p>Elephant</p>

            </div>

            <!-- TENNISBALL -->
            <div class="card border2"
                 draggable="true"
                 data-answer="small">

                <img src="https://cdn-icons-png.flaticon.com/512/861/861512.png" alt="Tennisball">
                <!-- Replace with:
                assets/tennisball.png
                -->

                <p>Tennisball</p>

            </div>

            <!-- TRUCK -->
            <div class="card border3"
                 draggable="true"
                 data-answer="big">

                <img src="assets/truck.png" alt="Truck">
                <p>Truck</p>

            </div>

            <!-- ANT -->
            <div class="card border4"
                 draggable="true"
                 data-answer="small">

                <img src="assets/ant.png" alt="Ant">
                <p>Ant</p>

            </div>

            <!-- TREE -->
            <div class="card border5"
                 draggable="true"
                 data-answer="big">

                <img src="assets/tree.png" alt="Tree">
                <p>Tree</p>

            </div>

            <!-- PLANT -->
            <div class="card border6"
                 draggable="true"
                 data-answer="small">

                <img src="https://cdn-icons-png.flaticon.com/512/628/628324.png" alt="Plant">
                <!-- Replace with:
                assets/plant.png
                -->

                <p>Plant</p>

            </div>

        </div>

        <!-- RIGHT PANEL -->

        <div class="right-panel">

            <!-- BIG -->

            <div class="zone" data-zone="big">

                <h2>big</h2>

                <div class="drop-items"></div>

            </div>

            <!-- SMALL -->

            <div class="zone" data-zone="small">

                <h2>small</h2>

                <div class="drop-items"></div>

            </div>

        </div>

    </div>

</div>

<!-- ================= SLIDE 3 ================= -->

<div id="slide3" class="slide">

    <canvas id="confetti"></canvas>

    <div class="success">
        Fantastic!
    </div>

</div>

<script>

/* ================= SLIDE TRANSITION ================= */

setTimeout(() => {

    document.getElementById("slide1").style.display = "none";

}, 3000);

/* ================= DRAG & DROP ================= */

const cards = document.querySelectorAll(".card");
const zones = document.querySelectorAll(".zone");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

const tick = document.getElementById("tick");
const cross = document.getElementById("cross");

let draggedCard = null;
let correctCount = 0;

/* DESKTOP + MOBILE */

cards.forEach(card => {

    card.addEventListener("dragstart", () => {

        draggedCard = card;

    });

    card.addEventListener("touchstart", () => {

        draggedCard = card;

    });

});

zones.forEach(zone => {

    zone.addEventListener("dragover", (e) => {

        e.preventDefault();

    });

    zone.addEventListener("drop", () => {

        processDrop(zone);

    });

    zone.addEventListener("touchend", () => {

        if(draggedCard){

            processDrop(zone);

        }

    });

});

/* ================= GAME LOGIC ================= */

function processDrop(zone){

    const answer = draggedCard.dataset.answer;
    const selectedZone = zone.dataset.zone;

    if(answer === selectedZone){

        zone.querySelector(".drop-items").appendChild(draggedCard);

        draggedCard.draggable = false;

        draggedCard.style.cursor = "default";
        draggedCard.style.opacity = "0.95";

        correctSound.currentTime = 0;
        correctSound.play();

        showTick();

        correctCount++;

        if(correctCount === 6){

            setTimeout(() => {

                document.getElementById("slide2").style.display = "none";

                document.getElementById("slide3").style.display = "flex";

                startConfetti();

            },1200);

        }

    }else{

        wrongSound.currentTime = 0;
        wrongSound.play();

        showCross();
    }

    draggedCard = null;
}

/* ================= FEEDBACK ================= */

function showTick(){

    tick.classList.add("show");

    setTimeout(() => {

        tick.classList.remove("show");

    },800);
}

function showCross(){

    cross.classList.add("show");

    setTimeout(() => {

        cross.classList.remove("show");

    },800);
}

/* ================= CONFETTI ================= */

function startConfetti(){

    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const confetti = [];

    for(let i=0;i<250;i++){

        confetti.push({

            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height-canvas.height,
            r:Math.random()*8+4,
            d:Math.random()*250

        });

    }

    function draw(){

        ctx.clearRect(0,0,canvas.width,canvas.height);

        confetti.forEach(c => {

            ctx.beginPath();

            ctx.fillStyle =
            `hsl(${Math.random()*360},100%,50%)`;

            ctx.arc(c.x,c.y,c.r,0,Math.PI*2);

            ctx.fill();

        });

        update();
    }

    function update(){

        confetti.forEach(c => {

            c.y += Math.cos(c.d)+4+c.r/2;

            if(c.y > canvas.height){

                c.y = -20;

            }

        });

    }

    setInterval(draw,20);
}

</script>

</body>
</html>
