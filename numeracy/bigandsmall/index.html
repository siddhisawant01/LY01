<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Big and Small</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
overflow:hidden;
background:#fff;
}

.screen{
width:100vw;
height:100vh;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
padding:15px;
position:relative;
background-image:
linear-gradient(rgba(255,255,255,0.75),rgba(255,255,255,0.75)),
url("https://i.pinimg.com/736x/0e/4f/1c/0e4f1c42b6459b8f73d1b267c8470c73.jpg");
background-size:cover;
background-position:center;
}

.screen.active{
display:flex;
}

.logo{
width:min(300px,70vw);
max-height:220px;
object-fit:contain;
}

.instruction{
font-size:clamp(24px,4vw,40px);
font-weight:bold;
color:#ff4d6d;
margin-bottom:20px;
text-align:center;
}

.game-area{
width:100%;
display:flex;
justify-content:space-evenly;
align-items:center;
gap:10px;
}

.option{
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:0.2s;
padding:10px;
border-radius:25px;
border:8px solid;
background:white;
}

.option:nth-child(1){
border-color:#ff6b6b;
}

.option:nth-child(2){
border-color:#4ecdc4;
}

.option img{
object-fit:contain;
}

.big{
width:min(300px,40vw);
height:min(300px,40vw);
}

.small{
width:min(150px,20vw);
height:min(150px,20vw);
}

.feedback{
position:absolute;
font-size:min(140px,22vw);
display:none;
z-index:10;
}

.tick{
color:green;
}

.cross{
color:red;
}

.amazing{
font-size:clamp(40px,8vw,90px);
font-weight:bold;
color:#ff4081;
text-align:center;
z-index:2;
}

.confetti{
position:absolute;
width:12px;
height:12px;
animation:fall linear infinite;
}

@keyframes fall{
from{
transform:translateY(-100px) rotate(0deg);
}
to{
transform:translateY(110vh) rotate(720deg);
}
}

.nextBtn{
position:absolute;
bottom:20px;
right:20px;
padding:12px 22px;
font-size:20px;
border:none;
border-radius:12px;
background:#4caf50;
color:white;
display:none;
}

@media(max-width:768px){

.game-area{
flex-direction:row;
}

.big{
width:42vw;
height:42vw;
}

.small{
width:24vw;
height:24vw;
}

.instruction{
font-size:30px;
}
}
</style>
</head>
<body>

<audio id="clap" src="assets/clap.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<!-- Slide 1 -->
<div class="screen active" id="screen0" style="background:white;">
<img src="assets/innovine-logo.png" class="logo">
</div>

<!-- Slide 2 -->
<div class="screen" id="screen1">
<div class="instruction">Identify Big</div>

<div class="game-area">
<div class="option" onclick="checkAnswer(true,1)">
<img src="assets/elephant.png" class="big">
</div>

<div class="option" onclick="checkAnswer(false,1)">
<img src="assets/ant.png" class="small">
</div>
</div>

<div class="feedback tick">✓</div>
<div class="feedback cross">✗</div>
<button class="nextBtn" onclick="nextScreen()">Next</button>
</div>

<!-- Slide 3 -->
<div class="screen" id="screen2">
<div class="instruction">Identify Small</div>

<div class="game-area">
<div class="option" onclick="checkAnswer(false,2)">
<img src="assets/tree.png" class="big">
</div>

<div class="option" onclick="checkAnswer(true,2)">
<img src="assets/plant.png" class="small">
</div>
</div>

<div class="feedback tick">✓</div>
<div class="feedback cross">✗</div>
<button class="nextBtn" onclick="nextScreen()">Next</button>
</div>

<!-- Slide 4 -->
<div class="screen" id="screen3">
<div class="instruction">Identify Big</div>

<div class="game-area">
<div class="option" onclick="checkAnswer(true,3)">
<img src="assets/basketball.png" class="big">
</div>

<div class="option" onclick="checkAnswer(false,3)">
<img src="assets/tennisball.png" class="small">
</div>
</div>

<div class="feedback tick">✓</div>
<div class="feedback cross">✗</div>
<button class="nextBtn" onclick="nextScreen()">Next</button>
</div>

<!-- Slide 5 -->
<div class="screen" id="screen4">
<div class="instruction">Identify Small</div>

<div class="game-area">
<div class="option" onclick="checkAnswer(false,4)">
<img src="assets/truck.png" class="big">
</div>

<div class="option" onclick="checkAnswer(true,4)">
<img src="assets/scooty.png" class="small">
</div>
</div>

<div class="feedback tick">✓</div>
<div class="feedback cross">✗</div>
<button class="nextBtn" onclick="nextScreen()">Next</button>
</div>

<!-- Slide 6 -->
<div class="screen" id="screen5">
<div class="instruction">Identify Big</div>

<div class="game-area">
<div class="option" onclick="checkAnswer(true,5)">
<img src="assets/elephant.png" class="big">
</div>

<div class="option" onclick="checkAnswer(false,5)">
<img src="assets/ant.png" class="small">
</div>
</div>

<div class="feedback tick">✓</div>
<div class="feedback cross">✗</div>
<button class="nextBtn" onclick="nextScreen()">Next</button>
</div>

<!-- Slide 7 -->
<div class="screen" id="screen6">
<div class="amazing">🎉 AMAZING! 🎉</div>
</div>

<script>

let currentScreen = 0;

setTimeout(()=>{
nextScreen();
},2000);

function nextScreen(){

document.getElementById("screen"+currentScreen).classList.remove("active");

currentScreen++;

if(currentScreen<=6){
document.getElementById("screen"+currentScreen).classList.add("active");
}

if(currentScreen===6){
createConfetti();
}
}

function checkAnswer(correct,screenNo){

let screen=document.getElementById("screen"+screenNo);

let tick=screen.querySelector(".tick");
let cross=screen.querySelector(".cross");
let nextBtn=screen.querySelector(".nextBtn");

if(correct){

document.getElementById("clap").currentTime=0;
document.getElementById("clap").play();

tick.style.display="block";

setTimeout(()=>{
tick.style.display="none";
nextBtn.style.display="block";
},1200);

}
else{

document.getElementById("wrong").currentTime=0;
document.getElementById("wrong").play();

cross.style.display="block";

setTimeout(()=>{
cross.style.display="none";
},1000);

}
}

function createConfetti(){

const colors=[
"#ff4081",
"#ff9800",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffeb3b"
];

for(let i=0;i<120;i++){

let conf=document.createElement("div");

conf.classList.add("confetti");

conf.style.left=Math.random()*100+"vw";
conf.style.background=colors[Math.floor(Math.random()*colors.length)];

conf.style.animationDuration=
(Math.random()*3+3)+"s";

conf.style.animationDelay=
(Math.random()*2)+"s";

document.getElementById("screen6").appendChild(conf);
}
}
</script>

</body>
</html>
