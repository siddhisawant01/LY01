<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Seasons Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
display:none;
}

.active{
display:flex;
}

/* ---------------- Slide 1 ---------------- */

#slide1{
background:white;
justify-content:center;
align-items:center;
}

#slide1 img{
width:40%;
max-width:300px;
}

/* ---------------- Slide 2 ---------------- */

#slide2{
flex-direction:column;
background:
linear-gradient(rgba(255,255,255,.88),rgba(255,255,255,.88)),
url('https://images.unsplash.com/photo-1513151233558-d860c5398176?w=1200');
background-size:cover;
background-position:center;
padding:10px;
}

.instruction{
text-align:center;
font-size:clamp(18px,2.2vw,28px);
font-weight:bold;
padding:10px;
color:#222;
}

.top-area{
height:45%;
display:flex;
gap:10px;
}

.bottom-area{
height:55%;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(2,1fr);
gap:10px;
padding-top:10px;
}

.season-card{
flex:1;
border-radius:20px;
padding:8px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
position:relative;
border:4px solid white;
box-shadow:0 5px 12px rgba(0,0,0,.2);
overflow:hidden;
}

.season-card img{
height:65%;
width:100%;
object-fit:contain;
pointer-events:none;
}

.dropped-items{
display:flex;
flex-wrap:wrap;
justify-content:center;
align-items:center;
gap:4px;
width:100%;
height:35%;
}

.dropped-items img{
width:50px;
height:50px;
object-fit:contain;
}

.rainy{
background:linear-gradient(135deg,#7ed6ff,#4fa3ff);
}

.winter{
background:linear-gradient(135deg,#cfefff,#ffffff);
}

.summer{
background:linear-gradient(135deg,#ffe57f,#ffb347);
}

.object-card{
background:white;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 5px 12px rgba(0,0,0,.2);
border:4px solid #fff;
padding:5px;
cursor:pointer;
transition:.2s;
}

.object-card img{
width:70%;
height:65%;
object-fit:contain;
pointer-events:none;
}

.object-card span{
font-weight:bold;
font-size:clamp(12px,1.8vw,20px);
margin-top:5px;
}

.selected{
transform:scale(1.05);
border:5px solid #ff4081;
}

/* ---------------- Feedback ---------------- */

.feedback{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
font-weight:bold;
display:none;
z-index:999;
}

.correct{
color:#00c853;
}

.wrong{
color:#ff1744;
}

/* ---------------- Slide 3 ---------------- */

#slide3{
background:linear-gradient(135deg,#4facfe,#00f2fe);
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

#amazing{
font-size:clamp(40px,8vw,90px);
font-weight:bold;
color:white;
text-shadow:0 0 20px rgba(255,255,255,.8);
z-index:2;
}

.snowflake{
position:absolute;
top:-20px;
color:white;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}
</style>
</head>

<body>

<!-- Slide 1 -->

<div id="slide1" class="slide active">
<img src="assets/innovine-logo.png" alt="Innovine">
</div>

<!-- Slide 2 -->

<div id="slide2" class="slide">

<div class="instruction">
Identify the given object and put them in the correct season.
</div>

<div class="top-area">

<div class="season-card rainy" data-season="rainy">
<img src="assets/rainyseason.png">
<div class="dropped-items"></div>
</div>

<div class="season-card winter" data-season="winter">
<img src="assets/winterseason.png">
<div class="dropped-items"></div>
</div>

<div class="season-card summer" data-season="summer">
<img src="assets/summerseason.png">
<div class="dropped-items"></div>
</div>

</div>

<div class="bottom-area">

<div class="object-card" data-answer="winter">
<img src="assets/socks.png">
<span>Socks</span>
</div>

<div class="object-card" data-answer="summer">
<img src="assets/juice.png">
<span>Juice</span>
</div>

<div class="object-card" data-answer="summer">
<img src="assets/sunglasses.png">
<span>Sunglasses</span>
</div>

<div class="object-card" data-answer="rainy">
<img src="assets/umbrella.png">
<span>Umbrella</span>
</div>

<div class="object-card" data-answer="rainy">
<img src="assets/raincoat.png">
<span>Raincoat</span>
</div>

<div class="object-card" data-answer="winter">
<img src="assets/sweater.png">
<span>Sweater</span>
</div>

</div>

<div id="tick" class="feedback correct">✓</div>
<div id="cross" class="feedback wrong">✗</div>

</div>

<!-- Slide 3 -->

<div id="slide3" class="slide">
<div id="amazing">Amazing!</div>
</div>

<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

setTimeout(()=>{
document.getElementById("slide1").classList.remove("active");
document.getElementById("slide2").classList.add("active");
},3000);

const objects=document.querySelectorAll(".object-card");
const seasons=document.querySelectorAll(".season-card");

let selected=null;
let completed=0;

objects.forEach(item=>{

item.addEventListener("click",()=>{

document.querySelectorAll(".object-card").forEach(o=>{
o.classList.remove("selected");
});

selected=item;
item.classList.add("selected");

});

});

seasons.forEach(zone=>{

zone.addEventListener("click",()=>{

if(!selected) return;

const correct=selected.dataset.answer;
const chosen=zone.dataset.season;

if(correct===chosen){

showTick();

const mini=document.createElement("img");
mini.src=selected.querySelector("img").src;

zone.querySelector(".dropped-items").appendChild(mini);

selected.remove();

selected=null;

completed++;

if(completed===6){

setTimeout(()=>{
showFinalSlide();
},1200);

}

}else{

showCross();
document.getElementById("wrongSound").play();

}

});

});

function showTick(){

const tick=document.getElementById("tick");

tick.style.display="block";

setTimeout(()=>{
tick.style.display="none";
},800);

}

function showCross(){

const cross=document.getElementById("cross");

cross.style.display="block";

setTimeout(()=>{
cross.style.display="none";
},800);

}

function showFinalSlide(){

document.getElementById("slide2").classList.remove("active");
document.getElementById("slide3").classList.add("active");

createSnow();

}

function createSnow(){

setInterval(()=>{

const snow=document.createElement("div");

snow.className="snowflake";
snow.innerHTML="❄";

snow.style.left=Math.random()*100+"vw";
snow.style.animationDuration=(Math.random()*3+2)+"s";

document.getElementById("slide3").appendChild(snow);

setTimeout(()=>{
snow.remove();
},5000);

},150);

}
</script>

</body>
</html>
