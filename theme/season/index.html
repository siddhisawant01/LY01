<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Seasons Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
}

body{
background:#fff;
}

/* =========================
SLIDES
========================= */

.slide{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
}

.hidden{
display:none;
}

/* =========================
INTRO
========================= */

#intro{
display:flex;
justify-content:center;
align-items:center;
background:white;
}

#intro img{
width:300px;
max-width:80%;
}

/* =========================
GAME SCREEN
========================= */

#game{
background:
radial-gradient(circle at 20% 20%, #ffcf70 0%, transparent 12%),
radial-gradient(circle at 80% 15%, #ff6fa9 0%, transparent 12%),
radial-gradient(circle at 10% 80%, #76d7ff 0%, transparent 12%),
radial-gradient(circle at 90% 75%, #8fff8f 0%, transparent 12%),
#fff7ef;

display:flex;
flex-direction:column;
padding:10px;
}

.title{
text-align:center;
font-weight:bold;
font-size:clamp(16px,2vw,24px);
margin-bottom:8px;
color:#333;
}

/* top half */

.seasons{
flex:1;
display:flex;
gap:10px;
justify-content:space-evenly;
align-items:center;
}

.season{
width:31%;
height:100%;
background:white;
border-radius:20px;
border:4px solid white;
box-shadow:0 4px 10px rgba(0,0,0,.15);
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.season img{
width:100%;
height:100%;
object-fit:cover;
}

.drop-zone{
position:absolute;
bottom:5px;
left:5px;
right:5px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:4px;
}

/* bottom half */

.objects{
flex:0.75;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:10px;
}

.object{
background:white;
border-radius:15px;
padding:4px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,.15);
cursor:pointer;
transition:.2s;
}

.object.selected{
transform:scale(1.08);
border:4px solid #ff9800;
}

.object img{
width:55px;
height:55px;
object-fit:contain;
}

.label{
font-weight:bold;
font-size:13px;
margin-top:4px;
}

/* success object */

.mini{
width:45px;
height:45px;
object-fit:contain;
}

/* feedback */

.feedback{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
font-weight:bold;
display:none;
z-index:999;
pointer-events:none;
}

.correct{
color:green;
}

.wrong{
color:red;
}

/* =========================
FINAL SCREEN
========================= */

#final{
background:linear-gradient(#89cff0,#ffffff);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

.amazing{
font-size:clamp(40px,8vw,90px);
font-weight:bold;
color:#0066ff;
text-shadow:3px 3px white;
z-index:10;
}

.snow{
position:absolute;
top:-20px;
color:white;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

@media(max-width:768px){

.object img{
width:45px;
height:45px;
}

.label{
font-size:11px;
}

.feedback{
font-size:80px;
}

}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro" class="slide">
<img src="assets/innovine-logo.png">
</div>

<!-- GAME -->

<div id="game" class="slide hidden">

<div class="title">
Identify the given object and put them in the correct season
</div>

<div class="seasons">

<div class="season" data-season="rainy">
<img src="assets/rainyseason.png">
<div class="drop-zone" id="rainyZone"></div>
</div>

<div class="season" data-season="winter">
<img src="assets/winterseason.png">
<div class="drop-zone" id="winterZone"></div>
</div>

<div class="season" data-season="summer">
<img src="assets/summerseason.png">
<div class="drop-zone" id="summerZone"></div>
</div>

</div>

<div class="objects">

<div class="object" data-item="socks">
<img src="assets/socks.png">
<div class="label">Socks</div>
</div>

<div class="object" data-item="juice">
<img src="assets/juice.png">
<div class="label">Juice</div>
</div>

<div class="object" data-item="sunglasses">
<img src="assets/sunglasses.png">
<div class="label">Sunglasses</div>
</div>

<div class="object" data-item="umbrella">
<img src="assets/umbrella.png">
<div class="label">Umbrella</div>
</div>

<div class="object" data-item="raincoat">
<img src="assets/raincoat.png">
<div class="label">Raincoat</div>
</div>

<div class="object" data-item="sweater">
<img src="assets/sweater.png">
<div class="label">Sweater</div>
</div>

</div>

</div>

<div id="tick" class="feedback correct">✓</div>
<div id="cross" class="feedback wrong">✗</div>

<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<!-- FINAL -->

<div id="final" class="slide hidden">
<div class="amazing">Amazing!</div>
</div>

<script>

setTimeout(()=>{
document.getElementById("intro").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
},3000);

const answers={
socks:"winter",
juice:"summer",
sunglasses:"summer",
umbrella:"rainy",
raincoat:"rainy",
sweater:"winter"
};

let selected=null;
let completed=0;

document.querySelectorAll(".object").forEach(obj=>{

obj.addEventListener("click",()=>{

document.querySelectorAll(".object").forEach(o=>
o.classList.remove("selected")
);

obj.classList.add("selected");
selected=obj;

});

});

document.querySelectorAll(".season").forEach(season=>{

season.addEventListener("click",()=>{

if(!selected) return;

const item=selected.dataset.item;
const chosen=season.dataset.season;

if(answers[item]===chosen){

showTick();

const mini=document.createElement("img");
mini.src=selected.querySelector("img").src;
mini.className="mini";

document.getElementById(chosen+"Zone")
.appendChild(mini);

selected.remove();

selected=null;
completed++;

if(completed===6){

setTimeout(showFinal,1000);

}

}else{

showCross();

document.getElementById("wrongSound").currentTime=0;
document.getElementById("wrongSound").play();

}

});

});

function showTick(){

const t=document.getElementById("tick");
t.style.display="block";

setTimeout(()=>{
t.style.display="none";
},800);

}

function showCross(){

const c=document.getElementById("cross");
c.style.display="block";

setTimeout(()=>{
c.style.display="none";
},800);

}

function showFinal(){

document.getElementById("game").classList.add("hidden");
document.getElementById("final").classList.remove("hidden");

for(let i=0;i<60;i++){

let snow=document.createElement("div");

snow.className="snow";
snow.innerHTML="❄";

snow.style.left=Math.random()*100+"%";
snow.style.animationDuration=
(Math.random()*5+3)+"s";

snow.style.opacity=Math.random();

document.getElementById("final")
.appendChild(snow);

}

}

</script>

</body>
</html>
