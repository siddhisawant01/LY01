<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Seasons Matching Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial Rounded MT Bold, Arial, sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    background:#fff;
}

/* ---------------- SCREENS ---------------- */

.screen{
    position:absolute;
    inset:0;
    display:none;
}

.screen.active{
    display:flex;
}

/* ---------------- SPLASH ---------------- */

#splash{
    background:white;
    justify-content:center;
    align-items:center;
}

#splash img{
    width:min(500px,70vw);
    max-height:60vh;
    object-fit:contain;
}

/* ---------------- GAME ---------------- */

#game{
    flex-direction:column;
    padding:1vh;
    background:
    linear-gradient(rgba(255,255,255,.15),rgba(255,255,255,.15)),
    url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200");
    background-size:cover;
    background-position:center;
}

.instruction{
    height:10%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-size:clamp(18px,2vw,32px);
    font-weight:bold;
    color:#222;
    background:rgba(255,255,255,.85);
    border-radius:20px;
    margin-bottom:1vh;
}

/* ---------------- SEASONS ---------------- */

.seasons{
    height:48%;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1vw;
}

.season{
    background:white;
    border:4px solid white;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    box-shadow:0 4px 10px rgba(0,0,0,.25);
}

.season img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.dropArea{
    position:absolute;
    inset:0;
    display:flex;
    flex-wrap:wrap;
    align-content:flex-start;
    justify-content:center;
    padding:5px;
}

.matched{
    width:70px;
    height:70px;
    background:white;
    border-radius:12px;
    margin:4px;
    padding:4px;
}

.matched img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* ---------------- OBJECTS ---------------- */

.objects{
    height:42%;
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:.8vw;
    margin-top:1vh;
}

.object{
    background:linear-gradient(135deg,#ffef9f,#ffd5f0);
    border-radius:18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    border:3px solid transparent;
    transition:.2s;
    box-shadow:0 3px 8px rgba(0,0,0,.25);
}

.object img{
    width:65%;
    height:65%;
    object-fit:contain;
}

.label{
    font-size:clamp(12px,1vw,18px);
    font-weight:bold;
    color:#333;
}

.selected{
    border:5px solid #00a2ff;
    transform:scale(1.05);
}

.hidden{
    display:none;
}

/* ---------------- POPUPS ---------------- */

.feedback{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:120px;
    font-weight:bold;
    display:none;
    z-index:999;
    animation:pop .8s;
}

.tick{
    color:#00cc44;
}

.cross{
    color:red;
}

@keyframes pop{
    0%{
        transform:translate(-50%,-50%) scale(.2);
        opacity:0;
    }
    100%{
        transform:translate(-50%,-50%) scale(1);
        opacity:1;
    }
}

/* ---------------- COMPLETION SCREEN ---------------- */

#complete{
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6ec6ff,#d7f2ff);
    overflow:hidden;
}

#complete h1{
    font-size:clamp(50px,8vw,110px);
    color:white;
    text-shadow:4px 4px 8px rgba(0,0,0,.25);
}

.snow{
    position:absolute;
    top:-20px;
    color:white;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}

@media(max-width:900px){

.objects{
    grid-template-columns:repeat(3,1fr);
    height:42%;
}

.matched{
    width:55px;
    height:55px;
}

}

</style>
</head>

<body>

<!-- SPLASH -->

<div id="splash" class="screen active">
    <img src="assets/innovine_logo.png">
</div>

<!-- GAME -->

<div id="game" class="screen">

<div class="instruction">
Identify the given object and put them in the correct season.
</div>

<div class="seasons">

<div class="season" data-season="rainy">
<img src="assets/rainyseason.png">
<div class="dropArea" id="rainy"></div>
</div>

<div class="season" data-season="winter">
<img src="assets/winterseason.png">
<div class="dropArea" id="winter"></div>
</div>

<div class="season" data-season="summer">
<img src="assets/summerseason.png">
<div class="dropArea" id="summer"></div>
</div>

</div>

<div class="objects">

<div class="object" data-item="socks">
<img src="assets/socks.png">
<div class="label">Socks</div>
</div>

<div class="object" data-item="juice">
<img src="assets/juice.png">
<div class="label">Juice</div>
</div>

<div class="object" data-item="sunglasses">
<img src="assets/sunglasses.png">
<div class="label">Sunglasses</div>
</div>

<div class="object" data-item="umbrella">
<img src="assets/umbrella.png">
<div class="label">Umbrella</div>
</div>

<div class="object" data-item="raincoat">
<img src="assets/raincoat.png">
<div class="label">Raincoat</div>
</div>

<div class="object" data-item="sweater">
<img src="assets/sweater.png">
<div class="label">Sweater</div>
</div>

</div>

</div>

<!-- COMPLETE -->

<div id="complete" class="screen">
<h1>Amazing!</h1>
</div>

<div id="tick" class="feedback tick">✓</div>
<div id="cross" class="feedback cross">✗</div>

<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* ---------------- SPLASH ---------------- */

setTimeout(()=>{
    document.getElementById("splash").classList.remove("active");
    document.getElementById("game").classList.add("active");
},3000);

/* ---------------- ANSWERS ---------------- */

const answers={
    socks:"winter",
    juice:"summer",
    sunglasses:"summer",
    umbrella:"rainy",
    raincoat:"rainy",
    sweater:"winter"
};

let selected=null;
let matchedCount=0;

const objects=document.querySelectorAll(".object");

objects.forEach(item=>{

    item.addEventListener("click",()=>{

        document.querySelectorAll(".object").forEach(x=>{
            x.classList.remove("selected");
        });

        selected=item;
        item.classList.add("selected");

    });

});

document.querySelectorAll(".season").forEach(season=>{

    season.addEventListener("click",()=>{

        if(!selected) return;

        const item=selected.dataset.item;
        const chosen=season.dataset.season;

        if(answers[item]===chosen){

            showTick();
            playCorrect();

            const target=document.getElementById(chosen);

            const div=document.createElement("div");
            div.className="matched";

            div.innerHTML=
            `<img src="${selected.querySelector('img').src}">`;

            target.appendChild(div);

            selected.classList.add("hidden");

            matchedCount++;

            if(matchedCount===6){

                setTimeout(showComplete,1000);

            }

        }else{

            showCross();

            document.getElementById("wrongSound").play();

        }

        selected.classList.remove("selected");
        selected=null;

    });

});

/* ---------------- FEEDBACK ---------------- */

function showTick(){

    const t=document.getElementById("tick");

    t.style.display="block";

    setTimeout(()=>{
        t.style.display="none";
    },700);

}

function showCross(){

    const c=document.getElementById("cross");

    c.style.display="block";

    setTimeout(()=>{
        c.style.display="none";
    },700);

}

/* ---------------- SUCCESS SOUND ---------------- */

function playCorrect(){

    const audioCtx=
    new(window.AudioContext||window.webkitAudioContext)();

    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value=700;

    gain.gain.value=.15;

    osc.start();

    osc.stop(audioCtx.currentTime+.2);

}

/* ---------------- COMPLETE SCREEN ---------------- */

function showComplete(){

    document.getElementById("game").classList.remove("active");
    document.getElementById("complete").classList.add("active");

    createSnow();

}

function createSnow(){

    for(let i=0;i<80;i++){

        const snow=document.createElement("div");

        snow.className="snow";
        snow.innerHTML="❄";

        snow.style.left=Math.random()*100+"vw";
        snow.style.fontSize=(15+Math.random()*30)+"px";
        snow.style.animationDuration=(4+Math.random()*6)+"s";

        document.getElementById("complete")
        .appendChild(snow);

    }

}

</script>

</body>
</html>
