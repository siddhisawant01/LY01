<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Seasons Sorting Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:"Arial Rounded MT Bold", Arial, sans-serif;
}

body{
    background:#fff;
}

/* ---------- SLIDES ---------- */

.slide{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    transition:opacity .6s ease;
}

.hidden{
    opacity:0;
    pointer-events:none;
}

/* ---------- INTRO ---------- */

#intro{
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
}

#intro img{
    width:min(55vw,320px);
    max-width:320px;
    object-fit:contain;
}

/* ---------- GAME ---------- */

#game{
    background:url('assets/game_bg.jpg') center center/cover no-repeat;
    display:flex;
    flex-direction:column;
    padding:1vh;
}

.instruction{
    text-align:center;
    font-size:clamp(18px,2vw,34px);
    font-weight:bold;
    color:#ffffff;
    text-shadow:2px 2px 4px rgba(0,0,0,.5);
    margin-bottom:1vh;
    padding:.5vh;
}

.main-area{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:1vh;
}

/* ---------- SEASON TARGETS ---------- */

.seasons{
    height:54%;
    display:flex;
    gap:1vw;
}

.season{
    flex:1;
    border:4px solid rgba(255,255,255,.85);
    border-radius:22px;
    background-size:cover;
    background-position:center;
    position:relative;
    overflow:hidden;
    display:flex;
    flex-wrap:wrap;
    align-content:flex-start;
    justify-content:center;
    padding:8px;
    cursor:pointer;
    transition:.2s;
}

.season:hover{
    transform:scale(1.01);
}

.rainy{
    background-image:url('assets/rainy_bg.png');
}

.winter{
    background-image:url('assets/winter_bg.png');
}

.summer{
    background-image:url('assets/summer_bg.png');
}

/* ---------- OBJECTS ---------- */

.objects{
    height:42%;
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:.8vw;
}

.object{
    background:linear-gradient(135deg,#fff6b7,#ffd9f7);
    border-radius:18px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    border:3px solid #ffffff;
    transition:.25s;
    user-select:none;
    box-shadow:0 4px 10px rgba(0,0,0,.18);
}

.object:hover{
    transform:translateY(-2px);
}

.object.selected{
    border:4px solid #00ff7b;
    transform:scale(1.05);
    animation:pulse .8s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(0,255,123,.7);}
    70%{box-shadow:0 0 0 15px rgba(0,255,123,0);}
    100%{box-shadow:0 0 0 0 rgba(0,255,123,0);}
}

.icon{
    font-size:clamp(22px,4vw,52px);
}

.label{
    margin-top:4px;
    font-size:clamp(12px,1.2vw,18px);
    font-weight:bold;
    color:#333;
    text-align:center;
    padding:0 2px;
}

/* ---------- MATCHED ITEMS ---------- */

.matched{
    width:80px;
    height:80px;
    margin:5px;
    background:rgba(255,255,255,.9);
    border-radius:14px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:14px;
    font-weight:bold;
}

/* ---------- FEEDBACK ---------- */

.feedback{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:min(20vw,180px);
    font-weight:bold;
    z-index:999;
    opacity:0;
    pointer-events:none;
}

.feedback.show{
    animation:popup .8s forwards;
}

.success{
    color:#00d84f;
}

.fail{
    color:#ff3333;
}

@keyframes popup{
    0%{
        opacity:0;
        transform:scale(.2);
    }
    30%{
        opacity:1;
        transform:scale(1.2);
    }
    100%{
        opacity:0;
        transform:scale(1);
    }
}

/* ---------- COMPLETION ---------- */

.complete-screen{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.75);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:#fff;
    z-index:1000;
}

.complete-screen h1{
    font-size:clamp(30px,5vw,70px);
}

.complete-screen p{
    font-size:clamp(18px,2vw,28px);
    margin-top:10px;
}

/* ---------- MOBILE ---------- */

@media(max-width:900px){

    .objects{
        grid-template-columns:repeat(3,1fr);
        grid-template-rows:repeat(2,1fr);
    }

    .matched{
        width:58px;
        height:58px;
        font-size:11px;
    }
}
</style>
</head>

<body>

<!-- INTRO -->

<div id="intro" class="slide">
    <img src="assets/innovine_logo.png" alt="Innovine Logo">
</div>

<!-- GAME -->

<div id="game" class="slide hidden">

    <div class="instruction">
        Identify the given object and put them in the correct season.
    </div>

    <div class="main-area">

        <div class="seasons">

            <div class="season rainy" data-season="rainy"></div>

            <div class="season winter" data-season="winter"></div>

            <div class="season summer" data-season="summer"></div>

        </div>

        <div class="objects" id="objectsContainer">

            <div class="object" data-name="Socks" data-season="winter">
                <div class="icon">🧦</div>
                <div class="label">Socks</div>
            </div>

            <div class="object" data-name="Juice" data-season="summer">
                <div class="icon">🧃</div>
                <div class="label">Juice</div>
            </div>

            <div class="object" data-name="Sunglasses" data-season="summer">
                <div class="icon">🕶️</div>
                <div class="label">Sunglasses</div>
            </div>

            <div class="object" data-name="Umbrella" data-season="rainy">
                <div class="icon">☂️</div>
                <div class="label">Umbrella</div>
            </div>

            <div class="object" data-name="Raincoat" data-season="rainy">
                <div class="icon">🧥</div>
                <div class="label">Raincoat</div>
            </div>

            <div class="object" data-name="Sweater" data-season="winter">
                <div class="icon">🧶</div>
                <div class="label">Sweater</div>
            </div>

        </div>

    </div>

</div>

<div id="feedback" class="feedback"></div>

<div class="complete-screen" id="completeScreen">
    <h1>🎉 Excellent! 🎉</h1>
    <p>All objects matched correctly.</p>
</div>

<script>

/* ---------------- INTRO ---------------- */

setTimeout(() => {
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
}, 3000);

/* ---------------- GAME ---------------- */

let selectedObject = null;
let matchedCount = 0;

const objects = document.querySelectorAll(".object");
const seasons = document.querySelectorAll(".season");

/* ---------- AUDIO ---------- */

function playTone(freq,duration){

    const audioContext =
        new (window.AudioContext || window.webkitAudioContext)();

    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(audioContext.destination);

    osc.start();

    gain.gain.setValueAtTime(0.15,audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audioContext.currentTime + duration
    );

    osc.stop(audioContext.currentTime + duration);
}

function successSound(){
    playTone(700,.15);
    setTimeout(()=>playTone(900,.15),120);
}

function failSound(){
    playTone(220,.35);
}

/* ---------- FEEDBACK ---------- */

function showFeedback(type){

    const feedback = document.getElementById("feedback");

    if(type==="success"){
        feedback.innerHTML="✔";
        feedback.className="feedback success show";
    }else{
        feedback.innerHTML="✖";
        feedback.className="feedback fail show";
    }

    setTimeout(()=>{
        feedback.className="feedback";
    },800);
}

/* ---------- SELECT OBJECT ---------- */

objects.forEach(item=>{

    item.addEventListener("click",()=>{

        document
            .querySelectorAll(".object")
            .forEach(obj=>obj.classList.remove("selected"));

        selectedObject=item;
        item.classList.add("selected");
    });

});

/* ---------- CHOOSE SEASON ---------- */

seasons.forEach(season=>{

    season.addEventListener("click",()=>{

        if(!selectedObject) return;

        const correctSeason =
            selectedObject.dataset.season;

        const clickedSeason =
            season.dataset.season;

        if(correctSeason===clickedSeason){

            successSound();
            showFeedback("success");

            const icon =
                selectedObject.querySelector(".icon").innerHTML;

            const label =
                selectedObject.querySelector(".label").innerHTML;

            const matchedItem =
                document.createElement("div");

            matchedItem.className="matched";

            matchedItem.innerHTML=
                `<div>${icon}</div>
                 <div>${label}</div>`;

            season.appendChild(matchedItem);

            selectedObject.remove();

            matchedCount++;

            if(matchedCount===6){

                setTimeout(()=>{
                    document
                    .getElementById("completeScreen")
                    .style.display="flex";
                },800);
            }

        }else{

            failSound();
            showFeedback("fail");

            selectedObject.classList.remove("selected");
        }

        selectedObject=null;

    });

});

</script>

</body>
</html>
