<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Seasons Matching Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Arial Rounded MT Bold", Arial, sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#ffffff;
}

/* ---------- SCREENS ---------- */

.screen{
position:absolute;
inset:0;
display:none;
}

.screen.active{
display:flex;
}

/* ---------- INTRO ---------- */

#intro{
background:#ffffff;
justify-content:center;
align-items:center;
}

#intro img{
width:min(500px,70vw);
height:auto;
object-fit:contain;
}

/* ---------- GAME ---------- */

#game{
flex-direction:column;
background:#ffffff;
padding:10px;
}

/* Instruction */

.instruction{
height:9%;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-size:clamp(20px,2vw,34px);
font-weight:bold;
background:#f4f4f4;
border-radius:18px;
margin-bottom:10px;
color:#222;
}

/* Seasons Row */

.seasons{
height:46%;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

/* Season Cards */

.seasonCard{
background:#ffffff;
border:3px solid #d9d9d9;
border-radius:22px;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 3px 12px rgba(0,0,0,.15);
cursor:pointer;
}

/* IMPORTANT PART */
/* Image now fills the entire top area */

.seasonImage{
height:62%;
width:100%;
padding:0;
margin:0;
overflow:hidden;
display:block;
line-height:0;
}

.seasonImage img{
width:100%;
height:100%;
display:block;
object-fit:fill;
}

/* Drop Area */

.dropArea{
height:38%;
background:#ffffff;
display:flex;
flex-wrap:wrap;
justify-content:center;
align-content:flex-start;
padding:8px;
gap:6px;
}

/* Matched Objects */

.matchedItem{
width:60px;
height:60px;
background:#fff9d9;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
border:2px solid #ffd54f;
}

.matchedItem img{
width:90%;
height:90%;
object-fit:contain;
}

/* Objects Section */

.objects{
height:42%;
margin-top:12px;
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
}

.object{
background:linear-gradient(180deg,#fff7cc,#ffdbe8);
border-radius:22px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
border:4px solid transparent;
transition:.2s;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.object img{
width:72%;
height:62%;
object-fit:contain;
}

.objectLabel{
font-weight:bold;
font-size:clamp(14px,1vw,20px);
color:#111;
padding-bottom:8px;
text-align:center;
text-transform:lowercase;
}

.selected{
border:4px solid #0099ff;
transform:scale(1.05);
}

/* Tick Cross */

.feedback{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
font-weight:bold;
display:none;
z-index:1000;
animation:pop .7s;
}

.tick{
color:#00c853;
}

.cross{
color:#ff1744;
}

@keyframes pop{

from{
opacity:0;
transform:translate(-50%,-50%) scale(.2);
}

to{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

}

/* Completion */

#complete{
background:linear-gradient(180deg,#b3e5fc,#ffffff);
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

#complete h1{
font-size:clamp(50px,8vw,110px);
color:#1976d2;
}

.snow{
position:absolute;
top:-20px;
color:white;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

/* Mobile */

@media(max-width:900px){

.objects{
grid-template-columns:repeat(3,1fr);
}

.object img{
width:65%;
}

.matchedItem{
width:45px;
height:45px;
}

}

</style>
</head>

<body>

<!-- INTRO SCREEN -->

<div id="intro" class="screen active">
<img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- GAME SCREEN -->

<div id="game" class="screen">

<div class="instruction">
Identify the given object and put them in the correct season.
</div>

<div class="seasons">

<!-- Rainy -->

<div class="seasonCard" data-season="rainy">

<div class="seasonImage">
<img src="assets/rainyseason.png" alt="rainy season">
</div>

<div class="dropArea" id="rainyArea"></div>

</div>

<!-- Winter -->

<div class="seasonCard" data-season="winter">

<div class="seasonImage">
<img src="assets/winterseason.png" alt="winter season">
</div>

<div class="dropArea" id="winterArea"></div>

</div>

<!-- Summer -->

<div class="seasonCard" data-season="summer">

<div class="seasonImage">
<img src="assets/summerseason.png" alt="summer season">
</div>

<div class="dropArea" id="summerArea"></div>

</div>

</div>

<!-- Objects -->

<div class="objects">

<div class="object" data-item="socks">
<img src="assets/socks.png">
<div class="objectLabel">socks</div>
</div>

<div class="object" data-item="juice">
<img src="assets/juice.png">
<div class="objectLabel">juice</div>
</div>

<div class="object" data-item="sunglasses">
<img src="assets/sunglasses.png">
<div class="objectLabel">sunglasses</div>
</div>

<div class="object" data-item="umbrella">
<img src="assets/umbrella.png">
<div class="objectLabel">umbrella</div>
</div>

<div class="object" data-item="raincoat">
<img src="assets/raincoat.png">
<div class="objectLabel">raincoat</div>
</div>

<div class="object" data-item="sweater">
<img src="assets/sweater.png">
<div class="objectLabel">sweater</div>
</div>

</div>

</div>

<!-- COMPLETE SCREEN -->

<div id="complete" class="screen">
<h1>Amazing!</h1>
</div>

<div id="tick" class="feedback tick">✓</div>
<div id="cross" class="feedback cross">✗</div>

<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* Intro */

setTimeout(()=>{

document.getElementById("intro").classList.remove("active");
document.getElementById("game").classList.add("active");

},3000);

/* Answers */

const answers={
socks:"winter",
juice:"summer",
sunglasses:"summer",
umbrella:"rainy",
raincoat:"rainy",
sweater:"winter"
};

let selectedObject=null;
let score=0;

/* Select Object */

document.querySelectorAll(".object").forEach(item=>{

item.addEventListener("click",()=>{

document.querySelectorAll(".object").forEach(obj=>{
obj.classList.remove("selected");
});

selectedObject=item;
item.classList.add("selected");

});

});

/* Select Season */

document.querySelectorAll(".seasonCard").forEach(card=>{

card.addEventListener("click",()=>{

if(!selectedObject) return;

const itemName=selectedObject.dataset.item;
const chosenSeason=card.dataset.season;

if(answers[itemName]===chosenSeason){

showTick();
playCorrectSound();

const targetArea=document.getElementById(chosenSeason+"Area");

const placed=document.createElement("div");
placed.className="matchedItem";

placed.innerHTML=
`<img src="${selectedObject.querySelector('img').src}">`;

targetArea.appendChild(placed);

selectedObject.style.visibility="hidden";
selectedObject.style.pointerEvents="none";

score++;

if(score===6){

setTimeout(showComplete,1000);

}

}else{

showCross();

const wrong=document.getElementById("wrongSound");
wrong.currentTime=0;
wrong.play();

}

selectedObject.classList.remove("selected");
selectedObject=null;

});

});

/* Feedback */

function showTick(){

const tick=document.getElementById("tick");

tick.style.display="block";

setTimeout(()=>{
tick.style.display="none";
},700);

}

function showCross(){

const cross=document.getElementById("cross");

cross.style.display="block";

setTimeout(()=>{
cross.style.display="none";
},700);

}

/* Correct Sound */

function playCorrectSound(){

try{

const ctx=new(window.AudioContext||window.webkitAudioContext)();

const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type="sine";
osc.frequency.value=700;

osc.connect(gain);
gain.connect(ctx.destination);

gain.gain.value=.15;

osc.start();
osc.stop(ctx.currentTime+0.2);

}catch(e){}

}

/* Completion */

function showComplete(){

document.getElementById("game").classList.remove("active");
document.getElementById("complete").classList.add("active");

for(let i=0;i<100;i++){

const snow=document.createElement("div");

snow.className="snow";
snow.innerHTML="❄";

snow.style.left=Math.random()*100+"vw";
snow.style.fontSize=(15+Math.random()*25)+"px";
snow.style.animationDuration=(4+Math.random()*6)+"s";

document.getElementById("complete").appendChild(snow);

}

}

</script>

</body>
</html>
